<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Med-Learn</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">Med<span>Learn</span></a>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="sw">SW</button>
    </div>
  </div>
</header>

<main class="container">
  <div style="margin-bottom:1.25rem;">
    <h1 id="page-title" style="font-size:22px; font-weight:600;">Courses</h1>
    <p id="page-subtitle" style="color:var(--text-muted); font-size:14px; margin-top:4px;">
      Select a course to start learning
    </p>
  </div>

  <div id="category-filter" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:1.25rem;"></div>

  <div id="course-grid" class="course-grid" style="display:flex; flex-direction:column; gap:1rem;">
    <div class="spinner"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/lang.js"></script>
<script>

const I18N = {
  en: {
    page_title: 'Courses',
    page_subtitle: 'Select a course to start learning',
    all: 'All',
    lessons: 'lessons',
    start: 'Start',
    continue: 'Continue',
    completed: 'Completed',
    your_progress: 'Your progress',
  },
  sw: {
    page_title: 'Kozi',
    page_subtitle: 'Chagua kozi kuanza kujifunza',
    all: 'Zote',
    lessons: 'masomo',
    start: 'Anza',
    continue: 'Endelea',
    completed: 'Imekamilika',
    your_progress: 'Maendeleo yako',
  }
};

function t(key) { return I18N[Lang.current][key] || key; }

function getLocalProgress(cId) {
  try { return JSON.parse(localStorage.getItem('progress_' + cId) || '{}'); }
  catch { return {}; }
}

let allCourses = [];
let activeCategory = 'all';

function applyLang() {
  document.getElementById('page-title').textContent = t('page_title');
  document.getElementById('page-subtitle').textContent = t('page_subtitle');
  if (allCourses.length) renderCourses(allCourses);
}

async function loadCourses() {
  const { data, error } = await sb
    .from('courses')
    .select('*')
    .eq('published', true)
    .order('created_at');

  if (error || !data) {
    document.getElementById('course-grid').innerHTML =
      '<div class="empty-state"><p>Could not load courses.</p></div>';
    return;
  }

  allCourses = data;
  renderCategories(data);
  renderCourses(data);
}

function renderCategories(courses) {
  const cats = ['all', ...new Set(courses.map(c => c.category).filter(Boolean))];
  const wrap = document.getElementById('category-filter');
  wrap.innerHTML = cats.map(cat => `
    <button class="badge ${cat === activeCategory ? 'badge-brown' : 'badge-gray'}"
      style="cursor:pointer; padding:6px 14px; font-size:13px;"
      onclick="filterCategory('${cat}')">
      ${cat === 'all' ? t('all') : cat}
    </button>
  `).join('');
}

function filterCategory(cat) {
  activeCategory = cat;
  renderCategories(allCourses);
  const filtered = cat === 'all' ? allCourses : allCourses.filter(c => c.category === cat);
  renderCourses(filtered);
}

function renderCourses(courses) {
  const grid = document.getElementById('course-grid');
  if (!courses.length) {
    grid.innerHTML = '<div class="empty-state"><p>No courses found.</p></div>';
    return;
  }

  grid.innerHTML = courses.map(course => {
    const scores = getLocalProgress(course.id);
    const completedCount = Object.keys(scores).length;
    const total = course.lesson_count || 0;
    const pct = total ? Math.round(completedCount / total * 100) : 0;

    let earned = 0, max = 0;
    Object.values(scores).forEach(s => { earned += s.score || 0; max += s.max || 0; });

    const btnLabel = pct >= 100 ? t('completed') : completedCount > 0 ? t('continue') : t('start');

    const scoreHtml = max > 0
      ? `<div class="score-line" style="margin-top:6px;">
           <span>${t('your_progress')}:</span>
           <span class="score-value">${earned}/${max}</span>
           <span>(${Math.round(earned/max*100)}%)</span>
         </div>`
      : '';

    return `
    <div class="card" style="cursor:pointer;" onclick="goToCourse('${course.id}')">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
        <span class="badge badge-brown">${course.category || 'General'}</span>
        <span class="badge badge-gray">${course.lesson_count} ${t('lessons')}</span>
      </div>
      <h2 style="font-size:17px; font-weight:600; margin-bottom:6px;">
        ${Lang.t(course.title)}
      </h2>
      <p style="font-size:14px; color:var(--text-muted); margin-bottom:14px; line-height:1.5;">
        ${Lang.t(course.description)}
      </p>
      ${completedCount > 0 ? `
        <div class="progress-wrap" style="margin-bottom:6px;">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
        <div style="font-size:12px; color:var(--text-muted);">${pct}%</div>
        ${scoreHtml}
      ` : ''}
      <div style="margin-top:14px;">
        <button class="btn ${pct >= 100 ? 'btn-secondary' : 'btn-primary'}"
          onclick="event.stopPropagation(); goToCourse('${course.id}')">
          ${btnLabel}
        </button>
      </div>
    </div>`;
  }).join('');
}

function goToCourse(id) {
  window.location.href = `course.html?id=${id}`;
}

(async () => {
  Lang.init();
  applyLang();
  await loadCourses();
  document.addEventListener('langchange', applyLang);
})();

</script>
</body>
</html>
